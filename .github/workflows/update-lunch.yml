name: Update Lunch Data

on:
  schedule:
    # 台灣時間每週一早上 8:00 執行 (UTC 0:00)
    - cron: '0 0 * * 1'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # 如果沒有 requirements.txt，可以直接寫 pip install requests beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests beautifulsoup4; fi

      - name: Run lunch scraper
        run: |
          python lunch.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f "public/data/lunch.json" ]; then
            git add public/data/lunch.json
            # 只有在有變動時才 commit，避免空 commit 報錯
            git commit -m "Update lunch data [skip ci]" || echo "No changes to commit"
            git push
          else
            echo "Error: public/data/lunch.json not found. Check if your python script creates the directory."
            exit 1
          fi